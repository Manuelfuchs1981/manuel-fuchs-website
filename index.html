<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manuel Fuchs</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Jost:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      min-height: 100vh;
      background: #000000;
      font-family: 'Jost', 'Helvetica Neue', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes slideDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes riseUp    { from { opacity:0; transform:translateY(28px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn    { from { opacity:0; }                              to { opacity:1; } }

    /* ── Network Logo ─────────────────────────── */
    .logo-link {
      position: fixed;
      top: 30px; left: 40px;
      z-index: 100;
      text-decoration: none;
      animation: slideDown 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    .network-canvas {
      width: 108px; height: 108px;
      display: block;
      transition: filter 0.3s ease;
    }
    .logo-link:hover .network-canvas {
      filter: drop-shadow(0 0 10px rgba(200,168,75,0.6));
    }

    /* ── Hamburger ────────────────────────────── */
    .hamburger {
      position: fixed;
      top: 38px; right: 40px;
      z-index: 100;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 6px;
      animation: slideDown 0.8s cubic-bezier(0.22,1,0.36,1) both;
    }
    .hamburger span {
      display: block;
      width: 26px; height: 2px;
      background: rgba(255,255,255,0.8);
      border-radius: 2px;
      transition: all 0.35s cubic-bezier(0.22,1,0.36,1);
      transform-origin: center;
    }
    .hamburger:hover span { background: #c8a84b; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Nav Menu ─────────────────────────────── */
    .nav-menu {
      position: fixed;
      top: 0; right: 0;
      width: 260px; height: 100vh;
      background: rgba(10,10,10,0.97);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(200,168,75,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      padding: 0 48px;
      gap: 36px;
      z-index: 99;
      transform: translateX(100%);
      transition: transform 0.45s cubic-bezier(0.22,1,0.36,1);
    }
    .nav-menu.open { transform: translateX(0); }
    .nav-menu a {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      transition: color 0.25s ease;
    }
    .nav-menu a:hover { color: #c8a84b; }

    /* ── Social Icons ─────────────────────────── */
    .social {
      position: fixed;
      right: 40px; top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 10;
      animation: fadeIn 1s ease 1s both;
    }
    .social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      text-decoration: none;
      transition: border-color 0.3s ease, transform 0.3s ease;
    }
    .social a:hover { border-color: #c8a84b; transform: scale(1.12); }
    .social a svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.7); transition: fill 0.3s ease; }
    .social a:hover svg { fill: #c8a84b; }

    /* ── Hero ─────────────────────────────────── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 60px 32px;
      animation: riseUp 1.1s cubic-bezier(0.22,1,0.36,1) 0.2s both;
    }
    .portrait {
      width: min(320px, 76vw);
      display: block;
      mix-blend-mode: normal;
      filter: drop-shadow(0 6px 28px rgba(0,0,0,0.4));
      transition: transform 0.7s cubic-bezier(0.22,1,0.36,1);
    }
    .portrait:hover { transform: scale(1.015); }

    /* ── Footer ───────────────────────────────── */
    .foot {
      position: fixed;
      bottom: 32px; left: 0; right: 0;
      text-align: center;
      font-size: 0.68rem;
      font-weight: 200;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #333;
      animation: fadeIn 1s ease 1.3s both;
    }

    @media (max-width: 480px) {
      .logo-link { top: 20px; left: 20px; }
      .hamburger { top: 28px; right: 20px; }
      .social { display: none; }
    }

    /* ── Circular Text ────────────────────────── */
    .logo-text-wrap {
      position: fixed;
      top: 30px; left: 40px;
      width: 108px; height: 108px;
      z-index: 99;
      pointer-events: none;
    }
    .logo-text-wrap svg {
      width: 108px; height: 108px;
      animation: spinText 22s linear infinite;
    }
    @keyframes spinText {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .logo-text-wrap text {
      font-family: 'Roboto', sans-serif;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 2px;
      fill: rgba(168,168,176,0.75);
      text-transform: uppercase;
      transition: fill 0.3s ease;
    }
    .logo-link:hover ~ .logo-text-wrap text {
      fill: #c8a84b;
    }

    /* ── Timestamp ─────────────────────────────── */
    .deploy-time {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-family: 'Jost', monospace;
      font-size: 0.6rem;
      font-weight: 200;
      letter-spacing: 0.1em;
      color: rgba(168,168,176,0.8);
      z-index: 10;
      user-select: none;
    }

    /* ── Centered Logo ────────────────────────── */
    .center-logo {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 324px;
      height: 324px;
      z-index: 5;
    }
    .center-logo .network-canvas {
      width: 324px;
      height: 324px;
    }
    .center-logo-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 324px;
      height: 324px;
      pointer-events: none;
      z-index: 4;
    }
    .center-logo-text svg {
      width: 324px;
      height: 324px;
      animation: spinText 22s linear infinite;
    }
    .center-logo-text text {
      font-family: 'Roboto', sans-serif;
      font-size: 27px;
      font-weight: 700;
      fill: rgba(168,168,176,0.75);
      text-transform: uppercase;
    }
  </style>
</head>

  <script>
    // Hamburger
    function toggleMenu() {
      document.getElementById('hamburger').classList.toggle('open');
      document.getElementById('navMenu').classList.toggle('open');
    }

    // 3D Network Logo
    (function() {
      const canvas = document.getElementById('networkLogo');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = 108, H = 108, CX = W/2, CY = H/2, R = 36;
      let isHover = false, t = 0;

      canvas.closest('.logo-link').addEventListener('mouseenter', () => { isHover = true; var t=document.querySelector('.logo-text-wrap text'); if(t) t.style.fill='rgba(200,168,75,0.9)'; });
      canvas.closest('.logo-link').addEventListener('mouseleave', () => { isHover = false; var t=document.querySelector('.logo-text-wrap text'); if(t) t.style.fill='rgba(168,168,176,0.75)'; });

      const nodes = [
        [0,R,0],[R*.7,R*.5,R*.5],[-R*.7,R*.5,R*.5],
        [R*.7,-R*.5,-R*.3],[-R*.7,-R*.5,-R*.3],[0,-R,0],
        [R*.4,R*.2,-R*.8],[-R*.4,R*.3,-R*.8],[R*.85,-R*.1,.2],[-R*.85,-R*.1,.2]
      ];
      const edges = [
        [0,1],[0,2],[0,6],[0,7],[1,3],[1,8],[2,4],[2,9],
        [3,5],[4,5],[3,8],[4,9],[5,6],[5,7],[6,7],[8,9],[1,2],[3,4]
      ];

      function rotY(p,a){ const c=Math.cos(a),s=Math.sin(a); return [p[0]*c+p[2]*s,p[1],-p[0]*s+p[2]*c]; }
      function rotX(p,a){ const c=Math.cos(a),s=Math.sin(a); return [p[0],p[1]*c-p[2]*s,p[1]*s+p[2]*c]; }
      function proj(p){ const fov=200,z=p[2]+fov; return [CX+p[0]*fov/z, CY-p[1]*fov/z, p[2]]; }

      function draw() {
        ctx.clearRect(0,0,W,H);
        t += 0.009;
        const rotated = nodes.map(p => rotX(rotY(p,t), Math.sin(t*.35)*.35));
        const projected = rotated.map(proj);

        edges.forEach(([a,b]) => {
          const pa=projected[a], pb=projected[b];
          const depth = ((pa[2]+pb[2])/2 + R) / (R*2);
          const alpha = Math.max(0.06, depth*0.5+0.05);
          ctx.beginPath();
          ctx.moveTo(pa[0],pa[1]); ctx.lineTo(pb[0],pb[1]);
          ctx.strokeStyle = isHover ? `rgba(200,168,75,${alpha})` : `rgba(168,168,176,${alpha})`;
          ctx.lineWidth = 1;
          ctx.stroke();
        });

        projected.forEach((p,i) => {
          const depth = (rotated[i][2]+R)/(R*2);
          const size = 1.6 + depth*2.8;
          const alpha = 0.4 + depth*0.6;
          const g = ctx.createRadialGradient(p[0]-size*.3,p[1]-size*.3,0,p[0],p[1],size);
          if(isHover){
            g.addColorStop(0,`rgba(245,224,128,${alpha})`);
            g.addColorStop(1,`rgba(150,100,20,${alpha*.3})`);
          } else {
            g.addColorStop(0,`rgba(220,220,228,${alpha})`);
            g.addColorStop(1,`rgba(80,80,90,${alpha*.3})`);
          }
          ctx.beginPath();
          ctx.arc(p[0],p[1],size,0,Math.PI*2);
          ctx.fillStyle = g;
          ctx.fill();
        });

        requestAnimationFrame(draw);
      }
      draw();
    })();

    // Center 3D Network Logo
    (function() {
      var canvas = document.getElementById('networkLogoCenter');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W=324,H=324,CX=162,CY=162,R=108;
      var isHover=false, t=0;
      canvas.closest('.center-logo').addEventListener('mouseenter',function(){
        isHover=true;
        var txt=document.querySelector('.center-logo-text text');
        if(txt) txt.style.fill='rgba(200,168,75,0.9)';
      });
      canvas.closest('.center-logo').addEventListener('mouseleave',function(){
        isHover=false;
        var txt=document.querySelector('.center-logo-text text');
        if(txt) txt.style.fill='rgba(168,168,176,0.75)';
      });
      var nodes=[[0,R,0],[R*.7,R*.5,R*.5],[-R*.7,R*.5,R*.5],[R*.7,-R*.5,-R*.3],[-R*.7,-R*.5,-R*.3],[0,-R,0],[R*.4,R*.2,-R*.8],[-R*.4,R*.3,-R*.8],[R*.85,-R*.1,.2],[-R*.85,-R*.1,.2]];
      var edges=[[0,1],[0,2],[0,6],[0,7],[1,3],[1,8],[2,4],[2,9],[3,5],[4,5],[3,8],[4,9],[5,6],[5,7],[6,7],[8,9],[1,2],[3,4]];
      function rotY(p,a){var c=Math.cos(a),s=Math.sin(a);return[p[0]*c+p[2]*s,p[1],-p[0]*s+p[2]*c];}
      function rotX(p,a){var c=Math.cos(a),s=Math.sin(a);return[p[0],p[1]*c-p[2]*s,p[1]*s+p[2]*c];}
      function proj(p){var fov=600,z=p[2]+fov;return[CX+p[0]*fov/z,CY-p[1]*fov/z,p[2]];}
      function draw(){
        ctx.clearRect(0,0,W,H); t+=0.009;
        var rotated=nodes.map(function(p){return rotX(rotY(p,t),Math.sin(t*.35)*.35);});
        var projected=rotated.map(proj);
        edges.forEach(function(e){
          var pa=projected[e[0]],pb=projected[e[1]];
          var depth=((pa[2]+pb[2])/2+R)/(R*2);
          var alpha=Math.max(0.06,depth*0.5+0.05);
          ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);
          ctx.strokeStyle=isHover?'rgba(200,168,75,'+alpha+')':'rgba(168,168,176,'+alpha+')';
          ctx.lineWidth=2;ctx.stroke();
        });
        projected.forEach(function(p,i){
          var depth=(rotated[i][2]+R)/(R*2);
          var size=3+depth*6,alpha=0.4+depth*0.6;
          var g=ctx.createRadialGradient(p[0]-size*.3,p[1]-size*.3,0,p[0],p[1],size);
          if(isHover){g.addColorStop(0,'rgba(245,224,128,'+alpha+')');g.addColorStop(1,'rgba(150,100,20,'+(alpha*.3)+')');}
          else{g.addColorStop(0,'rgba(220,220,228,'+alpha+')');g.addColorStop(1,'rgba(80,80,90,'+(alpha*.3)+')');}
          ctx.beginPath();ctx.arc(p[0],p[1],size,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();

  </script>
