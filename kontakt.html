<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – Manuel Fuchs</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body { min-height: 100vh; background: #000; font-family: 'Jost', sans-serif; color: #fff; display: flex; flex-direction: column; }

    @keyframes slideDown { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
    @keyframes spinText { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }

    /* Logo */
    .logo-link { position:fixed; top:30px; left:40px; z-index:100; text-decoration:none; animation:slideDown 0.8s ease both; }
    .network-canvas { width:108px; height:108px; display:block; transition:filter 0.3s ease; }
    .logo-link:hover .network-canvas { filter:drop-shadow(0 0 10px rgba(200,168,75,0.6)); }
    .logo-text-wrap { position:fixed; top:30px; left:40px; width:108px; height:108px; z-index:99; pointer-events:none; }
    .logo-text-wrap svg { width:108px; height:108px; animation:spinText 22s linear infinite; }
    .logo-text-wrap text { font-family:'Roboto',sans-serif; font-size:9px; font-weight:700; fill:rgba(168,168,176,0.75); }

    /* Hamburger */
    .hamburger { position:fixed; top:38px; right:40px; z-index:300; cursor:pointer; display:flex; flex-direction:column; gap:5px; padding:8px; background:transparent; border:none; }
    .hamburger span { display:block; width:26px; height:2px; background:rgba(255,255,255,0.8); border-radius:2px; transition:all 0.35s ease; transform-origin:center; pointer-events:none; }
    .hamburger:hover span { background:#c8a84b; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; transform:scaleX(0); }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }

    /* Nav */
    .nav-menu { position:fixed; top:0; right:0; width:260px; height:100vh; background:rgba(10,10,10,0.97); backdrop-filter:blur(16px); border-left:1px solid rgba(200,168,75,0.15); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:0 48px; gap:36px; z-index:250; transform:translateX(100%); transition:transform 0.45s cubic-bezier(0.22,1,0.36,1); }
    .nav-menu.open { transform:translateX(0); }
    .nav-menu a { font-family:'Jost',sans-serif; font-weight:300; font-size:1.4rem; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.75); text-decoration:none; transition:color 0.25s ease; }
    .nav-menu a:hover { color:#c8a84b; }

    /* Overlay */
    .overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.5); }
    .overlay.open { display:block; }

    /* Contact */
    .contact-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:120px 40px 80px; animation:fadeUp 1s ease 0.3s both; }
    .contact-card { max-width:520px; width:100%; }
    .contact-card h1 { font-family:'Roboto',sans-serif; font-weight:700; font-size:clamp(2rem,5vw,3rem); letter-spacing:-0.02em; margin-bottom:8px; }
    .contact-card .subtitle { font-size:0.75rem; letter-spacing:0.18em; text-transform:uppercase; color:#c8a84b; margin-bottom:48px; }
    .contact-items { display:flex; flex-direction:column; gap:20px; margin-bottom:48px; }
    .contact-item { display:flex; align-items:center; gap:18px; padding:20px 24px; border:1px solid rgba(255,255,255,0.07); border-radius:4px; text-decoration:none; color:rgba(255,255,255,0.8); transition:border-color 0.3s ease, background 0.3s ease, color 0.3s ease; }
    .contact-item:hover { border-color:rgba(200,168,75,0.4); background:rgba(200,168,75,0.04); color:#c8a84b; }
    .contact-item svg { width:22px; height:22px; fill:rgba(168,168,176,0.7); flex-shrink:0; transition:fill 0.3s ease; }
    .contact-item:hover svg { fill:#c8a84b; }
    .contact-item .label { font-size:0.68rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.35); margin-bottom:2px; }
    .contact-item .value { font-size:0.95rem; font-weight:300; }
    .divider { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
    .divider span { font-size:0.65rem; letter-spacing:0.2em; text-transform:uppercase; color:rgba(255,255,255,0.25); }
    .social-row { display:flex; gap:16px; }
    .social-row a { display:flex; align-items:center; justify-content:center; width:48px; height:48px; border:1px solid rgba(255,255,255,0.1); border-radius:50%; text-decoration:none; transition:border-color 0.3s ease, transform 0.3s ease; }
    .social-row a:hover { border-color:#c8a84b; transform:scale(1.1); }
    .social-row a svg { width:20px; height:20px; fill:rgba(255,255,255,0.6); transition:fill 0.3s ease; }
    .social-row a:hover svg { fill:#c8a84b; }

    /* Form */
    .contact-form { margin-bottom: 40px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
    .form-group label { font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.4); }
    .form-group input, .form-group textarea {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 4px;
      padding: 14px 18px;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: #fff;
      outline: none;
      transition: border-color 0.3s ease, background 0.3s ease;
      width: 100%;
      resize: vertical;
    }
    .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(255,255,255,0.2); }
    .form-group input:focus, .form-group textarea:focus {
      border-color: rgba(200,168,75,0.5);
      background: rgba(200,168,75,0.03);
    }
    .btn-send {
      width: 100%;
      padding: 16px;
      background: transparent;
      border: 1px solid rgba(200,168,75,0.5);
      border-radius: 4px;
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #c8a84b;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease;
      margin-top: 8px;
    }
    .btn-send:hover { background: #c8a84b; color: #000; }
    .btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
    .success-msg {
      display: none;
      background: rgba(50,200,100,0.08);
      border: 1px solid rgba(50,200,100,0.25);
      border-radius: 4px;
      padding: 14px 18px;
      font-size: 0.85rem;
      color: rgba(100,220,140,0.9);
      margin-bottom: 16px;
      letter-spacing: 0.03em;
    }
    .success-msg.show { display: block; }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    .foot { text-align:center; padding:24px; font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase; color:#222; }

    /* ── Timestamp ─────────────────────────────── */
    .deploy-time {
      position: fixed;
      bottom: 16px;
      right: 16px;
      font-family: 'Jost', monospace;
      font-size: 0.6rem;
      font-weight: 200;
      letter-spacing: 0.1em;
      color: rgba(168,168,176,0.8);
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>

  <a href="https://www.manuel-fuchs.ch" class="logo-link">
    <canvas class="network-canvas" id="networkLogo" width="108" height="108"></canvas>
  </a>
  <div class="logo-text-wrap">
    <svg viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg">
      <defs><path id="cp" d="M54,54 m-44,0 a44,44 0 1,1 88,0 a44,44 0 1,1 -88,0"/></defs>
      <text><textPath href="#cp" startOffset="0%" textLength="276" lengthAdjust="spacing">MANUEL FUCHS · DIGITALPROZESSE · </textPath></text>
    </svg>
  </div>

  <div class="overlay" id="overlay"></div>

  <button class="hamburger" id="hamburger" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>

  <nav class="nav-menu" id="navMenu">
    <a href="kontakt.html">Kontakt</a>
    <a href="login.html">Login</a>
  </nav>

  <main class="contact-wrap">
    <div class="contact-card">
      <h1>Kontakt</h1>
      <p class="subtitle">Ich freue mich von dir zu hören</p>
      <!-- Contact Form -->
      <form class="contact-form" id="contactForm" action="https://formspree.io/f/mqegrajq" method="POST">
        <div class="form-row">
          <div class="form-group">
            <label>Vorname</label>
            <input type="text" name="Vorname" placeholder="Max" required>
          </div>
          <div class="form-group">
            <label>Nachname</label>
            <input type="text" name="Nachname" placeholder="Muster" required>
          </div>
        </div>
        <div class="form-group">
          <label>E-Mail</label>
          <input type="email" name="E-Mail" placeholder="deine&#64;email.ch" required>
        </div>
        <div class="form-group">
          <label>Betreff</label>
          <input type="text" name="Betreff" placeholder="Worum geht es?">
        </div>
        <div class="form-group">
          <label>Nachricht</label>
          <textarea name="Nachricht" placeholder="Deine Nachricht..." rows="5" required></textarea>
        </div>
        <div class="success-msg" id="successMsg">
          ✓ Nachricht gesendet — ich melde mich bald!
        </div>
        <button type="submit" class="btn-send" id="sendBtn">Nachricht senden</button>
      </form>

      <div class="divider"><span>Social Media</span></div>
      <div class="social-row">
        <a href="https://www.linkedin.com/in/manuelfuchs-1981/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg viewBox="0 0 24 24"><path d="M20.45 20.45h-3.56v-5.57c0-1.33-.03-3.04-1.85-3.04-1.85 0-2.13 1.45-2.13 2.94v5.67H9.35V9h3.41v1.56h.05c.48-.9 1.64-1.85 3.37-1.85 3.6 0 4.27 2.37 4.27 5.45v6.29zM5.34 7.43a2.07 2.07 0 1 1 0-4.14 2.07 2.07 0 0 1 0 4.14zm1.78 13.02H3.56V9h3.56v11.45zM22.22 0H1.77C.79 0 0 .77 0 1.73v20.54C0 23.23.79 24 1.77 24h20.45C23.21 24 24 23.23 24 22.27V1.73C24 .77 23.21 0 22.22 0z"/></svg>
        </a>
        <a href="https://www.facebook.com/manuelfuchshereiam" target="_blank" rel="noopener" aria-label="Facebook">
          <svg viewBox="0 0 24 24"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.04V9.41c0-3.02 1.8-4.7 4.54-4.7 1.31 0 2.68.24 2.68.24v2.97h-1.51c-1.49 0-1.95.93-1.95 1.88v2.27h3.32l-.53 3.49h-2.79V24C19.61 23.1 24 18.1 24 12.07z"/></svg>
        </a>
        <a href="https://www.instagram.com/manuel.fuchs_/" target="_blank" rel="noopener" aria-label="Instagram">
          <svg viewBox="0 0 24 24"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 3.25.15 4.77 1.69 4.92 4.92.06 1.27.07 1.65.07 4.85 0 3.2-.01 3.58-.07 4.85-.15 3.23-1.66 4.77-4.92 4.92-1.27.06-1.64.07-4.85.07-3.2 0-3.58-.01-4.85-.07-3.26-.15-4.77-1.7-4.92-4.92C2.17 15.58 2.16 15.2 2.16 12c0-3.2.01-3.58.07-4.85C2.38 3.85 3.9 2.31 7.15 2.23 8.42 2.17 8.8 2.16 12 2.16zm0-2.16C8.74 0 8.33.01 7.05.07 2.7.27.27 2.7.07 7.05.01 8.33 0 8.74 0 12c0 3.26.01 3.67.07 4.95.2 4.36 2.62 6.78 6.98 6.98C8.33 23.99 8.74 24 12 24c3.26 0 3.67-.01 4.95-.07 4.35-.2 6.78-2.62 6.98-6.98.06-1.28.07-1.69.07-4.95 0-3.26-.01-3.67-.07-4.95-.2-4.35-2.62-6.78-6.98-6.98C15.67.01 15.26 0 12 0zm0 5.84a6.16 6.16 0 1 0 0 12.32A6.16 6.16 0 0 0 12 5.84zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.4-11.85a1.44 1.44 0 1 0 0 2.88 1.44 1.44 0 0 0 0-2.88z"/></svg>
        </a>
      </div>
    </div>
  </main>

  <footer class="foot">© 2025 Manuel Fuchs</footer>

  <script>

    // Contact Form
    var form = document.getElementById('contactForm');
    if (form) {
      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var sendBtn = document.getElementById('sendBtn');
        var successMsg = document.getElementById('successMsg');
        sendBtn.disabled = true;
        sendBtn.textContent = 'Wird gesendet...';
        var data = new FormData(form);
        fetch('https://formspree.io/f/mqegrajq', {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        }).then(function(response) {
          if (response.ok) {
            successMsg.classList.add('show');
            sendBtn.textContent = 'Gesendet ✓';
            form.reset();
            setTimeout(function() {
              successMsg.classList.remove('show');
              sendBtn.disabled = false;
              sendBtn.textContent = 'Nachricht senden';
            }, 4000);
          } else {
            sendBtn.disabled = false;
            sendBtn.textContent = 'Fehler – nochmals versuchen';
          }
        }).catch(function() {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Fehler – nochmals versuchen';
        });
      });
    }

    // Hamburger menu
    var btn = document.getElementById('hamburger');
    var menu = document.getElementById('navMenu');
    var overlay = document.getElementById('overlay');

    btn.addEventListener('click', function() {
      btn.classList.toggle('open');
      menu.classList.toggle('open');
      overlay.classList.toggle('open');
    });

    overlay.addEventListener('click', function() {
      btn.classList.remove('open');
      menu.classList.remove('open');
      overlay.classList.remove('open');
    });

    // 3D Network Logo
    (function() {
      var canvas = document.getElementById('networkLogo');
      if (!canvas) return;
      var ctx = canvas.getContext('2d');
      var W=108,H=108,CX=54,CY=54,R=36;
      var isHover=false, t=0;
      canvas.closest('.logo-link').addEventListener('mouseenter',function(){isHover=true;});
      canvas.closest('.logo-link').addEventListener('mouseleave',function(){isHover=false;});
      var nodes=[[0,R,0],[R*.7,R*.5,R*.5],[-R*.7,R*.5,R*.5],[R*.7,-R*.5,-R*.3],[-R*.7,-R*.5,-R*.3],[0,-R,0],[R*.4,R*.2,-R*.8],[-R*.4,R*.3,-R*.8],[R*.85,-R*.1,.2],[-R*.85,-R*.1,.2]];
      var edges=[[0,1],[0,2],[0,6],[0,7],[1,3],[1,8],[2,4],[2,9],[3,5],[4,5],[3,8],[4,9],[5,6],[5,7],[6,7],[8,9],[1,2],[3,4]];
      function rotY(p,a){var c=Math.cos(a),s=Math.sin(a);return[p[0]*c+p[2]*s,p[1],-p[0]*s+p[2]*c];}
      function rotX(p,a){var c=Math.cos(a),s=Math.sin(a);return[p[0],p[1]*c-p[2]*s,p[1]*s+p[2]*c];}
      function proj(p){var fov=200,z=p[2]+fov;return[CX+p[0]*fov/z,CY-p[1]*fov/z,p[2]];}
      function draw(){
        ctx.clearRect(0,0,W,H); t+=0.009;
        var rotated=nodes.map(function(p){return rotX(rotY(p,t),Math.sin(t*.35)*.35);});
        var projected=rotated.map(proj);
        edges.forEach(function(e){
          var pa=projected[e[0]],pb=projected[e[1]];
          var depth=((pa[2]+pb[2])/2+R)/(R*2);
          var alpha=Math.max(0.06,depth*0.5+0.05);
          ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);
          ctx.strokeStyle=isHover?'rgba(200,168,75,'+alpha+')':'rgba(168,168,176,'+alpha+')';
          ctx.lineWidth=1;ctx.stroke();
        });
        projected.forEach(function(p,i){
          var depth=(rotated[i][2]+R)/(R*2);
          var size=1.6+depth*2.8,alpha=0.4+depth*0.6;
          var g=ctx.createRadialGradient(p[0]-size*.3,p[1]-size*.3,0,p[0],p[1],size);
          if(isHover){g.addColorStop(0,'rgba(245,224,128,'+alpha+')');g.addColorStop(1,'rgba(150,100,20,'+(alpha*.3)+')');}
          else{g.addColorStop(0,'rgba(220,220,228,'+alpha+')');g.addColorStop(1,'rgba(80,80,90,'+(alpha*.3)+')');}
          ctx.beginPath();ctx.arc(p[0],p[1],size,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
  <div class="deploy-time">⟳ 11.04.2026 - 06:46</div>
</body>
</html>
